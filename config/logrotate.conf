# Logrotate configuration for BTC Collateral Monitor
# Install: sudo cp config/logrotate.conf /etc/logrotate.d/rsk-collateral-monitor

/home/ovservant/projects/rsk-collateral-monitor/data/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 ovservant ovservant
    postrotate
        # Optional: Send signal to app to reopen logs
        # kill -HUP `cat /var/run/rsk-collateral-monitor.pid 2>/dev/null` 2>/dev/null || true
    endscript
}
